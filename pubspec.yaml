name: rensius
description: A new Flutter project for RENSIUS (Reservation and Sport Utility System).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1
  flutter_localizations:
    sdk: flutter
  google_maps_flutter: ^2.10.0
  flutter_dotenv: ^6.0.0
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
